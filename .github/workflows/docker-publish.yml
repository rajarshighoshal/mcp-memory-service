name: Docker Publish (Tags)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: doobidoo/mcp-memory-service

jobs:
  build-standard:
    name: Build Standard image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      wit
      h:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata (Standard)
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      wit
      h:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Standard Docker image
      id: build-and-push
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      wit
      h:
        context: .
        file: ./tools/docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=standard
        cache-to: type=gha,mode=max,scope=standard
        build-args: |
          SKIP_MODEL_DOWNLOAD=true
        outputs: type=registry

    - name: Generate artifact attestation (Standard)
      if: github.event_name != 'pull_request'
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      wit
      h:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
        subject-digest: ${{ steps.build-and-push.outputs.digest }}
        push-to-registry: true
      continue-on-error: true

  build-slim:
    name: Build Slim image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      wit
      h:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata (Slim)
      id: meta-slim
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      wit
      h:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch,suffix=-slim
          type=ref,event=pr,suffix=-slim
          type=semver,pattern={{version}},suffix=-slim
          type=semver,pattern={{major}}.{{minor}},suffix=-slim
          type=semver,pattern={{major}},suffix=-slim
          type=raw,value=slim,enable={{is_default_branch}}

    - name: Build and push Slim Docker image
      id: build-and-push-slim
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      wit
      h:
        context: .
        file: ./tools/docker/Dockerfile.slim
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-slim.outputs.tags }}
        labels: ${{ steps.meta-slim.outputs.labels }}
        cache-from: type=gha,scope=slim
        cache-to: type=gha,mode=max,scope=slim
        build-args: |
          SKIP_MODEL_DOWNLOAD=true
        outputs: type=registry

    - name: Generate artifact attestation (Slim)
      if: github.event_name != 'pull_request'
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      wit
      h:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
        subject-digest: ${{ steps.build-and-push-slim.outputs.digest }}
        push-to-registry: true
      continue-on-error: true

  build-quality-cpu:
    name: Build Quality CPU image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      wit
      h:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata (Quality CPU)
      id: meta-quality-cpu
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      wit
      h:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch,suffix=-quality-cpu
          type=ref,event=pr,suffix=-quality-cpu
          type=semver,pattern={{version}},suffix=-quality-cpu
          type=semver,pattern={{major}}.{{minor}},suffix=-quality-cpu
          type=semver,pattern={{major}},suffix=-quality-cpu
          type=raw,value=quality-cpu,enable={{is_default_branch}}

    - name: Build and push Quality CPU Docker image
      id: build-and-push-quality-cpu
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      wit
      h:
        context: .
        file: ./tools/docker/Dockerfile.quality-cpu
        # amd64 only: the builder stage installs CPU PyTorch (~750 MB) and
        # converts models to ONNX. Running this under QEMU arm64 emulation on
        # GitHub-hosted runners consistently exceeds the 6-hour job limit
        # (issue #1002). arm64 users should use :slim or :latest instead.
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-quality-cpu.outputs.tags }}
        labels: ${{ steps.meta-quality-cpu.outputs.labels }}
        cache-from: type=gha,scope=quality-cpu
        cache-to: type=gha,mode=max,scope=quality-cpu
        outputs: type=registry

    - name: Generate artifact attestation (Quality CPU)
      if: github.event_name != 'pull_request'
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      wit
      h:
        subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
        subject-digest: ${{ steps.build-and-push-quality-cpu.outputs.digest }}
        push-to-registry: true
      continue-on-error: true
