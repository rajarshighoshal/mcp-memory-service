name: Contributor PR Welcome

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Only post for non-owner contributors opening PRs; skip push/other events
            if (!context.payload.pull_request) { return; }
            if (context.payload.pull_request.user.login === context.repo.owner) { return; }
            const body = [
              "Thanks for the PR! 👌",
              "",
              "Before review, please verify the **Lean-MCP checklist**:",
              "",
              "- [ ] **Call path exists**: The new feature is reachable via an MCP tool or REST endpoint — not just internal helper code",
              "- [ ] **Tests included**: Unit tests cover the happy path and at least one edge case",
              "- [ ] **No dead code**: Code that is wired `later` in a follow-up PR will not be merged; wire it now or keep it out",
              "- [ ] **Pre-PR check passes**: `bash scripts/pr/pre_pr_check.sh` runs green locally",
              "",
              "_These are hard requirements, not suggestions. PRs that don't meet them will receive a `changes requested` review._",
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
