name: Discussion Triage

on:
  schedule:
    # Daily at 06:00 UTC (08:00 Europe/Zurich)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Print to logs only, do not update issue"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  discussions: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: scripts/maintenance/triage_discussions.py

      - name: Run triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          ARGS=("--repo" "$REPO" "--issue")
          if [ "${DRY_RUN:-false}" = "true" ]; then
            ARGS+=("--dry-run")
          fi
          python3 scripts/maintenance/triage_discussions.py "${ARGS[@]}"
